<!-- Left controls -->
<div class="panel" role="region" aria-label="controls">
  <div class="brand">
    <div class="logo">E</div>
    <div>
      <div class="title">Elitez Group</div>
      <div class="sub">Pitch Deck Generator</div>
    </div>
  </div>

  <div class="intro">Generate a clean, corporate Elitez-style pitch deck outline. Fill details below and create ready-to-review slides.</div>

  <div class="form" id="form">
    <div>
      <label for="clientName">Client Name</label>
      <input id="clientName" type="text" placeholder="e.g. ABC Holdings">
    </div>

    <div>
      <label for="industry">Industry</label>
      <input id="industry" type="text" placeholder="e.g. Logistics">
    </div>

    <div>
      <label for="country">Country / Market</label>
      <input id="country" type="text" placeholder="e.g. Vietnam">
    </div>

    <div>
      <label for="service">Service Needed</label>
      <select id="service">
        <option>Recruitment</option>
        <option>Payroll Outsourcing</option>
        <option>EOR / Employer of Record</option>
        <option>Executive Search</option>
        <option>Career Guidance</option>
      </select>
    </div>

    <div>
      <label for="goal">Pitch Goal</label>
      <textarea id="goal" placeholder="e.g. Convince the client to use Elitez for expansion into Vietnam"></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="btn ghost" onclick="resetForm()">Reset</button>
    <button class="btn primary" onclick="generateDeck()">Generate</button>
  </div>

  <div class="bottom-rule" aria-hidden="true"></div>
</div>

<!-- Right preview and output -->
<div class="stage">

  <!-- Live preview area -->
  <div class="preview" aria-hidden="true">
    <div id="livePreview" class="slide-card">
      <!-- default: cover slide -->
      <div class="cover">
        <div style="height:10px"></div>
        <div class="wordmark">
          E L I <span class="mark">+</span> E Z
        </div>
        <div class="tag">FULFILLING HUMAN POTENTIAL WITHOUT BORDERS</div>

        <div style="flex:1"></div>

        <div class="countries">
          <div>INDONESIA</div>
          <div>MALAYSIA</div>
          <div>SINGAPORE</div>
          <div>THAILAND</div>
          <div>VIETNAM</div>
          <div>INDIA</div>
        </div>

        <div class="skyline" aria-hidden="true">
          <!-- subtle skyline SVG for atmosphere -->
          <svg viewBox="0 0 1600 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#ffd9c9"/><stop offset="1" stop-color="#fff6d8"/></linearGradient></defs>
            <path d="M0 100 C120 60 200 90 320 60 C420 40 520 80 640 60 C740 48 840 80 980 60 C1120 40 1240 80 1440 60 C1520 50 1600 90 1600 120 L0 120 Z" fill="url(#g)"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Generated deck list -->
  <div id="deckOutput" class="deck-list" aria-live="polite">
    <!-- generated slides will appear here -->
  </div>
</div>
